# Restic-only: versioned snapshots of a small data volume.
# No rsync mirror, no database, no pre-hook.
#
# Good fit for: apps with config files, small state directories,
# anything where the entire dataset is small enough that a month
# of point-in-time snapshots costs nothing.

name: my-app

services:
  app:
    image: my-app:latest
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  # ─── backup sidecar ─────────────────────────────────────────────
  backup:
    image: ghcr.io/gedasfx/docker-backup:1
    environment:
      BACKUP_NAME: my-app
      BACKUP_INTERVAL: "86400"

      BACKUP_RESTIC_REPOSITORY: /mnt/repo
      BACKUP_RESTIC_PASSWORD: ${BACKUP_RESTIC_PASSWORD}
      BACKUP_RESTIC_SOURCES: /sources

      # Optional: override default retention (--keep-daily 7 --keep-weekly 4)
      # BACKUP_RESTIC_FORGET: "--keep-daily 30 --keep-monthly 12"

      BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL:-}

    volumes:
      - app-data:/sources:ro
      - /path/to/backups/my-app:/mnt/repo

    restart: unless-stopped

volumes:
  app-data:
