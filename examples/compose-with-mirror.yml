# Restic + rsync: small mutating state gets versioned snapshots,
# bulky immutable data gets a current-state mirror.
#
# Good fit for: any service with a content-addressed media store
# alongside a small config or index. Versioning the bulky store
# would be wasteful (files never change once written); mirroring
# keeps a copy that's trivial to restore from.

name: my-app

services:
  app:
    image: my-app:latest
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  # ─── backup sidecar ─────────────────────────────────────────────
  backup:
    image: ghcr.io/gedasfx/docker-backup:1
    environment:
      BACKUP_NAME: my-app
      BACKUP_CRON: "30 1 * * *"

      # ── restic: small mutating state
      BACKUP_RESTIC_REPOSITORY: /mnt/repo
      BACKUP_RESTIC_PASSWORD: ${BACKUP_RESTIC_PASSWORD}
      BACKUP_RESTIC_SOURCES: "/sources/db.sqlite /sources/config"
      BACKUP_RESTIC_EXCLUDES: "*.tmp *.lock"

      # ── rsync: bulky immutable data
      BACKUP_RSYNC_SRC: /sources/media
      BACKUP_RSYNC_DST: /mnt/mirror

      BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL:-}

    volumes:
      - app-data:/sources:ro
      - /path/to/backups/my-app:/mnt/repo
      - /path/to/mirror/my-app:/mnt/mirror

    restart: unless-stopped

volumes:
  app-data:
