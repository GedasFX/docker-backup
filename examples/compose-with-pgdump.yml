# Built-in pg_dump: recommended pattern when the database major
# matches the pg client in the image (alpine 3.20 = pg16).
#
# The backup container dumps pg_dump -F d -Z 0 into a scratch dir,
# auto-adds it to restic sources, snapshots everything, then wipes
# the scratch dir. No extra containers, no shared volumes, no
# docker.sock.
#
# For major-version mismatch see compose-pg-advanced.yml.

name: my-app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    image: my-app:latest
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@postgres:5432/app
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # ─── backup sidecar (pg image tag) ────────────────────────────────
  backup:
    image: ghcr.io/gedasfx/docker-backup:1-pg
    environment:
      BACKUP_NAME: my-app
      BACKUP_CRON: "30 1 * * *"

      # ── pg module: setting BACKUP_PG_HOST opts in
      BACKUP_PG_HOST: postgres
      BACKUP_PG_USER: app
      BACKUP_PG_DB: app
      BACKUP_PG_PASSWORD: ${POSTGRES_PASSWORD}
      # BACKUP_PG_TABLES: "users,orders"    # optional: limit to specific tables

      # ── restic: pg dump path is added automatically
      BACKUP_RESTIC_REPOSITORY: /mnt/repo
      BACKUP_RESTIC_PASSWORD: ${BACKUP_RESTIC_PASSWORD}
      # Additional non-db sources can still be listed:
      # BACKUP_RESTIC_SOURCES: /sources/uploads

      BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL:-}

    volumes:
      - /path/to/backups/my-app:/mnt/repo

    depends_on:
      postgres: { condition: service_healthy }

    restart: unless-stopped

volumes:
  pg-data:
