# Advanced postgres patterns -- fallbacks when the image's bundled
# pg_dump major doesn't match your database, or you'd rather run
# the dump inside the database container itself.
#
# Two patterns shown side-by-side, pick one. Most services should
# prefer the built-in pg module in compose-with-pgdump.yml first.

# ─────────────────────────────────────────────────────────────────
# Pattern A: docker exec via docker.sock
# ─────────────────────────────────────────────────────────────────
# The backup container reaches into the running postgres container
# and runs that container's own pg_dump. Major version always
# matches the server.
#
# Caveat: the image runs as non-root (uid 1000). Mounting
# docker.sock requires adding the host's docker group so the
# backup user can talk to the daemon. Check your host's docker
# gid with: stat -c '%g' /var/run/docker.sock

name: my-app

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
    restart: unless-stopped

  backup:
    image: ghcr.io/gedasfx/docker-backup:1
    group_add:
      - "999"   # docker group gid on the host -- adjust to match yours
    environment:
      BACKUP_NAME: my-app
      BACKUP_CRON: "30 1 * * *"
      BACKUP_RESTIC_REPOSITORY: /mnt/repo
      BACKUP_RESTIC_PASSWORD: ${BACKUP_RESTIC_PASSWORD}
      BACKUP_RESTIC_SOURCES: /dumps
      BACKUP_PRE: |
        rm -rf /dumps/db.dump.d
        docker exec -e PGPASSWORD=${POSTGRES_PASSWORD} my-app-postgres-1 \
          pg_dump -h localhost -U app -d app -F d -Z 0 \
            -f /tmp/db.dump.d
        docker cp my-app-postgres-1:/tmp/db.dump.d /dumps/db.dump.d
        docker exec my-app-postgres-1 rm -rf /tmp/db.dump.d
      BACKUP_WEBHOOK_URL: ${BACKUP_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dumps:/dumps
      - /path/to/backups/my-app:/mnt/repo
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

volumes:
  pg-data:
  dumps:


# ─────────────────────────────────────────────────────────────────
# Pattern B: external dump sidecar
# ─────────────────────────────────────────────────────────────────
# A dedicated dump container produces a fresh dump hourly into a
# shared volume; docker-backup snapshots the volume nightly.
# Useful when the database engine isn't postgres at all, or when
# you want dumps more often than the backup cadence.
#
# To use this pattern, replace the services block above with:
#
#   services:
#     postgres:
#       image: postgres:14-alpine
#       environment:
#         POSTGRES_DB: app
#         POSTGRES_USER: app
#         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
#       volumes:
#         - pg-data:/var/lib/postgresql/data
#       healthcheck:
#         test: ["CMD-SHELL", "pg_isready -U app -d app"]
#         interval: 5s
#       restart: unless-stopped
#
#     pg-dump:
#       image: prodrigestivill/postgres-backup-local:14
#       environment:
#         POSTGRES_HOST: postgres
#         POSTGRES_DB: app
#         POSTGRES_USER: app
#         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
#         POSTGRES_EXTRA_OPTS: "-F d -Z 0"
#         SCHEDULE: "@hourly"
#         BACKUP_DIR: /dumps
#         BACKUP_KEEP_DAYS: 1
#       volumes:
#         - dumps:/dumps
#       depends_on:
#         postgres: { condition: service_healthy }
#       restart: unless-stopped
#
